# frontend/nginx.conf
# Serves the React app and proxies /api calls to the backend container

server {
    listen 80;

    # Serve React static files
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # This is critical for React Router — always serve index.html
        # so client-side routes like /dashboard don't 404
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to the backend container
    # "backend" here matches the service name in docker-compose.yml
    location /api {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}